<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">
  <defs>
    <filter id="labelShadow">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="600" height="600" fill="#f8f5f0" rx="20"/>
  <!-- Nutrition label card -->
  <rect x="60" y="40" width="480" height="520" fill="#fff" stroke="#222" stroke-width="4" rx="4" filter="url(#labelShadow)"/>
  <!-- Header -->
  <rect x="60" y="40" width="480" height="70" fill="#222" rx="4"/>
  <rect x="60" y="80" width="480" height="30" fill="#222"/>
  <text x="300" y="85" font-family="'Impact','Arial Black',sans-serif" font-size="40" fill="#fff" text-anchor="middle" letter-spacing="2">MODEL SPEC</text>
  <!-- Thick divider -->
  <rect x="75" y="120" width="450" height="8" fill="#222"/>
  <!-- Model name -->
  <text x="85" y="155" font-family="'Helvetica Neue',Arial,sans-serif" font-size="14" fill="#666" font-weight="bold">Model Name</text>
  <text x="85" y="180" font-family="'Impact','Arial Black',sans-serif" font-size="28" fill="#222">developer_v4.2.0</text>
  <!-- Thin divider -->
  <rect x="75" y="192" width="450" height="1" fill="#ccc"/>
  <!-- Parameters -->
  <text x="85" y="218" font-family="'Helvetica Neue',Arial,sans-serif" font-size="14" fill="#222" font-weight="bold">Parameters</text>
  <text x="515" y="218" font-family="'Helvetica Neue',Arial,sans-serif" font-size="14" fill="#222" font-weight="bold" text-anchor="end">Amount</text>
  <rect x="75" y="226" width="450" height="3" fill="#222"/>
  <!-- Training data rows -->
  <text x="85" y="252" font-family="'Helvetica Neue',Arial,sans-serif" font-size="17" fill="#333">StackOverflow</text>
  <text x="515" y="252" font-family="'SF Mono','Consolas',monospace" font-size="15" fill="#333" text-anchor="end">47%</text>
  <rect x="75" y="262" width="450" height="1" fill="#ddd"/>
  <text x="85" y="286" font-family="'Helvetica Neue',Arial,sans-serif" font-size="17" fill="#333">GitHub Issues</text>
  <text x="515" y="286" font-family="'SF Mono','Consolas',monospace" font-size="15" fill="#333" text-anchor="end">23%</text>
  <rect x="75" y="296" width="450" height="1" fill="#ddd"/>
  <text x="85" y="320" font-family="'Helvetica Neue',Arial,sans-serif" font-size="17" fill="#333">2AM Desperation</text>
  <text x="515" y="320" font-family="'SF Mono','Consolas',monospace" font-size="15" fill="#333" text-anchor="end">15%</text>
  <rect x="75" y="330" width="450" height="1" fill="#ddd"/>
  <text x="85" y="354" font-family="'Helvetica Neue',Arial,sans-serif" font-size="17" fill="#333">Copied from Medium articles</text>
  <text x="515" y="354" font-family="'SF Mono','Consolas',monospace" font-size="15" fill="#333" text-anchor="end">8%</text>
  <rect x="75" y="364" width="450" height="1" fill="#ddd"/>
  <text x="85" y="388" font-family="'Helvetica Neue',Arial,sans-serif" font-size="17" fill="#333">YouTube tutorials (watched 30s)</text>
  <text x="515" y="388" font-family="'SF Mono','Consolas',monospace" font-size="15" fill="#333" text-anchor="end">5%</text>
  <rect x="75" y="398" width="450" height="1" fill="#ddd"/>
  <text x="85" y="422" font-family="'Helvetica Neue',Arial,sans-serif" font-size="17" fill="#333">Actual documentation</text>
  <text x="515" y="422" font-family="'SF Mono','Consolas',monospace" font-size="15" fill="#333" text-anchor="end">2%</text>
  <rect x="75" y="432" width="450" height="3" fill="#222"/>
  <!-- Warnings -->
  <text x="85" y="460" font-family="'Helvetica Neue',Arial,sans-serif" font-size="12" fill="#999" font-weight="bold">KNOWN SIDE EFFECTS:</text>
  <text x="85" y="478" font-family="'Helvetica Neue',Arial,sans-serif" font-size="12" fill="#999">Imposter syndrome, mass tab-hoarding, excessive</text>
  <text x="85" y="494" font-family="'Helvetica Neue',Arial,sans-serif" font-size="12" fill="#999">googling of basic syntax, involuntary refactoring.</text>
  <!-- Warning label -->
  <rect x="75" y="510" width="450" height="35" fill="#e94560" rx="3"/>
  <text x="300" y="533" font-family="'Impact','Arial Black',sans-serif" font-size="16" fill="#fff" text-anchor="middle" letter-spacing="2">WARNING: MAY PRODUCE UNDEFINED BEHAVIOR</text>
