<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">
  <defs>
    <filter id="subtleGlow">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#12121e"/>
      <stop offset="100%" stop-color="#0a0a14"/>
    </linearGradient>
  </defs>
  <!-- Clean dark background -->
  <rect width="600" height="600" fill="url(#bgGrad)" rx="20"/>
  <!-- Subtle circuit pattern -->
  <line x1="0" y1="100" x2="600" y2="100" stroke="#1a1a2e" stroke-width="0.5"/>
  <line x1="0" y1="200" x2="600" y2="200" stroke="#1a1a2e" stroke-width="0.5"/>
  <line x1="0" y1="400" x2="600" y2="400" stroke="#1a1a2e" stroke-width="0.5"/>
  <line x1="0" y1="500" x2="600" y2="500" stroke="#1a1a2e" stroke-width="0.5"/>
  <line x1="100" y1="0" x2="100" y2="600" stroke="#1a1a2e" stroke-width="0.5"/>
  <line x1="500" y1="0" x2="500" y2="600" stroke="#1a1a2e" stroke-width="0.5"/>
  <!-- Glitch lines -->
  <rect x="0" y="155" width="600" height="2" fill="#e94560" opacity="0.08"/>
  <rect x="0" y="445" width="600" height="2" fill="#e94560" opacity="0.08"/>
  <rect x="180" y="157" width="60" height="2" fill="#00ff41" opacity="0.12"/>
  <!-- Main text - bold and large -->
  <text x="300" y="200" font-family="'Helvetica Neue','Arial Black',Arial,sans-serif" font-size="80" font-weight="900" fill="#ffffff" text-anchor="middle" letter-spacing="-2">AI TOOK</text>
  <text x="300" y="300" font-family="'Helvetica Neue','Arial Black',Arial,sans-serif" font-size="80" font-weight="900" fill="#ffffff" text-anchor="middle" letter-spacing="-2">MY JOB</text>
  <!-- Divider -->
  <line x1="150" y1="340" x2="450" y2="340" stroke="#333" stroke-width="1"/>
  <!-- Plot twist reveal -->
  <text x="300" y="410" font-family="'SF Mono','Fira Code','Consolas',monospace" font-size="36" fill="#e94560" text-anchor="middle" filter="url(#subtleGlow)">(I'm the AI)</text>
  <!-- Blinking cursor after reveal -->
  <rect x="430" y="388" width="3" height="28" fill="#e94560" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0;0.6" dur="1.2s" repeatCount="indefinite"/>
  </rect>
  <!-- Small robot icon -->
  <g transform="translate(300,500)" opacity="0.4">
    <rect x="-18" y="-20" width="36" height="30" rx="5" fill="none" stroke="#e94560" stroke-width="2"/>
    <circle cx="-7" cy="-8" r="3" fill="#e94560"/>
    <circle cx="7" cy="-8" r="3" fill="#e94560"/>
    <line x1="-6" y1="2" x2="6" y2="2" stroke="#e94560" stroke-width="2"/>
    <line x1="0" y1="-20" x2="0" y2="-30" stroke="#e94560" stroke-width="2"/>
    <circle cx="0" cy="-33" r="3" fill="#e94560"/>
  </g>
  <!-- Version tag -->
  <text x="300" y="560" font-family="'SF Mono','Consolas',monospace" font-size="12" fill="#333" text-anchor="middle">model v0.0.1 // still in beta // pls be nice</text>
</svg>