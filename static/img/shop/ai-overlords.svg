<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">
  <defs>
    <radialGradient id="rays" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffcc00"/>
      <stop offset="40%" stop-color="#ff8800"/>
      <stop offset="100%" stop-color="#cc2200"/>
    </radialGradient>
    <filter id="retroGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="roundedClip">
      <rect width="600" height="600" rx="20"/>
    </clipPath>
  </defs>
  <!-- Background -->
  <rect width="600" height="600" fill="#1a0a00" rx="20"/>
  <!-- Radiating rays from center -->
  <g clip-path="url(#roundedClip)" opacity="0.6">
    <polygon points="300,300 -100,0 100,0" fill="#cc2200" opacity="0.3"/>
    <polygon points="300,300 100,0 250,0" fill="#dd4400" opacity="0.25"/>
    <polygon points="300,300 250,0 400,0" fill="#cc2200" opacity="0.3"/>
    <polygon points="300,300 400,0 550,0" fill="#dd4400" opacity="0.25"/>
    <polygon points="300,300 550,0 700,0" fill="#cc2200" opacity="0.3"/>
    <polygon points="300,300 700,0 700,150" fill="#dd4400" opacity="0.25"/>
    <polygon points="300,300 700,150 700,300" fill="#cc2200" opacity="0.3"/>
    <polygon points="300,300 700,300 700,450" fill="#dd4400" opacity="0.25"/>
    <polygon points="300,300 700,450 700,600" fill="#cc2200" opacity="0.3"/>
    <polygon points="300,300 700,600 550,600" fill="#dd4400" opacity="0.25"/>
    <polygon points="300,300 550,600 400,600" fill="#cc2200" opacity="0.3"/>
    <polygon points="300,300 400,600 250,600" fill="#dd4400" opacity="0.25"/>
    <polygon points="300,300 250,600 100,600" fill="#cc2200" opacity="0.3"/>
    <polygon points="300,300 100,600 -100,600" fill="#dd4400" opacity="0.25"/>
    <polygon points="300,300 -100,600 -100,450" fill="#cc2200" opacity="0.3"/>
    <polygon points="300,300 -100,450 -100,300" fill="#dd4400" opacity="0.25"/>
    <polygon points="300,300 -100,300 -100,150" fill="#cc2200" opacity="0.3"/>
    <polygon points="300,300 -100,150 -100,0" fill="#dd4400" opacity="0.25"/>
  </g>
  <!-- Central glow -->
  <circle cx="300" cy="300" r="120" fill="url(#rays)" opacity="0.15"/>
  <!-- Robot eye in center -->
  <circle cx="300" cy="260" r="55" fill="none" stroke="#ff4400" stroke-width="4" filter="url(#retroGlow)"/>
  <circle cx="300" cy="260" r="30" fill="#ff4400" opacity="0.6"/>
  <circle cx="300" cy="260" r="15" fill="#ffcc00"/>
  <circle cx="300" cy="260" r="6" fill="#fff"/>
  <!-- Vintage banner top -->
  <path d="M50,80 L550,80 L530,105 L550,130 L50,130 L70,105 Z" fill="#cc0000"/>
  <text x="300" y="115" font-family="'Impact','Arial Black',sans-serif" font-size="28" fill="#ffcc00" text-anchor="middle" letter-spacing="6" filter="url(#retroGlow)">ATTENTION HUMANS</text>
  <!-- Main text - vintage movie poster style -->
  <text x="300" y="390" font-family="'Georgia','Times New Roman',serif" font-size="24" fill="#ffddaa" text-anchor="middle" font-style="italic" filter="url(#retroGlow)">"I, for one, welcome our new"</text>
  <text x="300" y="450" font-family="'Impact','Arial Black',sans-serif" font-size="64" fill="#ffcc00" text-anchor="middle" font-weight="bold" letter-spacing="4" filter="url(#retroGlow)">AI OVERLORDS</text>
  <!-- Bottom banner -->
  <path d="M100,500 L500,500 L485,520 L500,540 L100,540 L115,520 Z" fill="#cc0000"/>
  <text x="300" y="527" font-family="'Georgia','Times New Roman',serif" font-size="16" fill="#ffddaa" text-anchor="middle" letter-spacing="3">RESISTANCE IS FUTILE</text>
  <!-- Vintage border -->
  <rect x="15" y="15" width="570" height="570" rx="15" fill="none" stroke="#ff4400" stroke-width="2" opacity="0.4"/>
  <rect x="8" y="8" width="584" height="584" rx="18" fill="none" stroke="#ff4400" stroke-width="1" opacity="0.2"/>
  <!-- Film grain dots -->
  <circle cx="50" cy="550" r="1" fill="#ffcc00" opacity="0.2"/>
  <circle cx="120" cy="170" r="1" fill="#ffcc00" opacity="0.15"/>
  <circle cx="480" cy="190" r="1.5" fill="#ffcc00" opacity="0.2"/>
  <circle cx="540" cy="480" r="1" fill="#ffcc00" opacity="0.15"/>
</svg>