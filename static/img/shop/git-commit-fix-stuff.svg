<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">
  <defs>
    <linearGradient id="termBg3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e1e2e"/>
      <stop offset="100%" stop-color="#11111b"/>
    </linearGradient>
    <filter id="glow3">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="clockGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="600" height="600" fill="#0a0a14" rx="20"/>
  <!-- Clock in top right -->
  <circle cx="510" cy="80" r="42" fill="none" stroke="#e94560" stroke-width="3" filter="url(#clockGlow)"/>
  <circle cx="510" cy="80" r="36" fill="none" stroke="#e94560" stroke-width="1" opacity="0.3"/>
  <!-- Clock hands - 2:00 AM -->
  <line x1="510" y1="80" x2="510" y2="55" stroke="#e94560" stroke-width="3" stroke-linecap="round"/>
  <line x1="510" y1="80" x2="530" y2="80" stroke="#e94560" stroke-width="2" stroke-linecap="round"/>
  <circle cx="510" cy="80" r="3" fill="#e94560"/>
  <!-- 2:00 AM label -->
  <text x="510" y="140" font-family="'SF Mono','Consolas',monospace" font-size="16" fill="#e94560" text-anchor="middle" font-weight="bold" filter="url(#clockGlow)">2:00 AM</text>
  <!-- Terminal window -->
  <rect x="30" y="170" width="540" height="380" rx="12" fill="url(#termBg3)" stroke="#333" stroke-width="1.5"/>
  <!-- Title bar -->
  <rect x="30" y="170" width="540" height="36" rx="12" ry="12" fill="#2a2a3e"/>
  <rect x="30" y="194" width="540" height="12" fill="#2a2a3e"/>
  <circle cx="56" cy="188" r="6.5" fill="#ff5f57"/>
  <circle cx="76" cy="188" r="6.5" fill="#febc2e"/>
  <circle cx="96" cy="188" r="6.5" fill="#28c840"/>
  <!-- Git commands -->
  <text x="55" y="240" font-family="'SF Mono','Fira Code','Consolas',monospace" font-size="20" fill="#00ff41" filter="url(#glow3)">
    <tspan fill="#666">$</tspan> git add .</text>
  <text x="55" y="290" font-family="'SF Mono','Fira Code','Consolas',monospace" font-size="20" fill="#00ff41" filter="url(#glow3)">
    <tspan fill="#666">$</tspan> git commit -m <tspan fill="#febc2e">"fix stuff"</tspan></text>
  <text x="55" y="340" font-family="'SF Mono','Fira Code','Consolas',monospace" font-size="20" fill="#00ff41" filter="url(#glow3)">
    <tspan fill="#666">$</tspan> git push <tspan fill="#e94560" font-weight="bold">--force</tspan></text>
  <!-- Response -->
  <text x="55" y="385" font-family="'SF Mono','Consolas',monospace" font-size="15" fill="#888">To github.com:dev/production.git</text>
  <text x="55" y="408" font-family="'SF Mono','Consolas',monospace" font-size="15" fill="#888"> + abc1234...def5678 main -&gt; main (forced update)</text>
  <!-- Warning sign -->
  <text x="55" y="450" font-family="'SF Mono','Consolas',monospace" font-size="15" fill="#e94560">&#x26A0;  You just force-pushed to main.</text>
  <!-- Blinking cursor -->
  <rect x="55" y="470" width="11" height="20" fill="#00ff41" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0;0.7" dur="1s" repeatCount="indefinite"/>
  </rect>
  <!-- Tagline at top -->
  <text x="200" y="80" font-family="'SF Mono','Consolas',monospace" font-size="14" fill="#555" text-anchor="middle">// TODO: write better commit messages</text>
  <!-- Sleep-deprived vibes -->
  <text x="300" y="580" font-family="'SF Mono','Consolas',monospace" font-size="13" fill="#444" text-anchor="middle">future me will understand this... probably</text>
</svg>