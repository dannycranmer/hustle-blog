<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">
  <defs>
    <filter id="pageShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-opacity="0.1"/>
    </filter>
  </defs>
  <!-- Browser background -->
  <rect width="600" height="600" fill="#f5f5f5" rx="20"/>
  <!-- Browser chrome -->
  <rect x="0" y="0" width="600" height="80" fill="#e8e8e8" rx="20"/>
  <rect x="0" y="60" width="600" height="20" fill="#e8e8e8"/>
  <!-- Traffic lights -->
  <circle cx="35" cy="28" r="7" fill="#ff5f57"/>
  <circle cx="57" cy="28" r="7" fill="#febc2e"/>
  <circle cx="79" cy="28" r="7" fill="#28c840"/>
  <!-- URL bar -->
  <rect x="110" y="13" width="380" height="30" rx="6" fill="#fff" stroke="#ddd" stroke-width="1"/>
  <text x="130" y="33" font-family="'SF Pro','Helvetica Neue',Arial,sans-serif" font-size="12" fill="#999">
    <tspan fill="#28c840">&#x1F512;</tspan>  https://my-brain.dev/motivation</text>
  <!-- Tab -->
  <rect x="100" y="55" width="160" height="25" rx="6" ry="6" fill="#f5f5f5"/>
  <rect x="100" y="68" width="160" height="12" fill="#f5f5f5"/>
  <text x="180" y="72" font-family="'SF Pro',Arial,sans-serif" font-size="11" fill="#666" text-anchor="middle">my-brain.dev</text>
  <!-- Page content area -->
  <rect x="40" y="100" width="520" height="460" fill="#fff" rx="8" filter="url(#pageShadow)"/>
  <!-- Sad face icon -->
  <circle cx="300" cy="200" r="50" fill="none" stroke="#ccc" stroke-width="4"/>
  <circle cx="280" cy="188" r="4" fill="#ccc"/>
  <circle cx="320" cy="188" r="4" fill="#ccc"/>
  <path d="M275 218 Q300 205 325 218" fill="none" stroke="#ccc" stroke-width="3" stroke-linecap="round"/>
  <!-- 404 huge -->
  <text x="300" y="340" font-family="'Helvetica Neue','Arial Black',Arial,sans-serif" font-size="120" font-weight="900" fill="#333" text-anchor="middle" letter-spacing="-2">404</text>
  <!-- Subtitle -->
  <text x="300" y="395" font-family="'Helvetica Neue',Arial,sans-serif" font-size="30" fill="#777" text-anchor="middle" font-weight="300">Motivation Not Found</text>
  <!-- Divider -->
  <line x1="180" y1="420" x2="420" y2="420" stroke="#eee" stroke-width="2"/>
  <!-- Description -->
  <text x="300" y="455" font-family="'Helvetica Neue',Arial,sans-serif" font-size="15" fill="#aaa" text-anchor="middle">The page you were looking for doesn't exist.</text>
  <text x="300" y="478" font-family="'Helvetica Neue',Arial,sans-serif" font-size="15" fill="#aaa" text-anchor="middle">You may have mistyped the address or the</text>
  <text x="300" y="501" font-family="'Helvetica Neue',Arial,sans-serif" font-size="15" fill="#aaa" text-anchor="middle">motivation may have moved to another URL.</text>
  <!-- Fake button -->
  <rect x="220" y="520" width="160" height="36" rx="6" fill="#4285f4"/>
  <text x="300" y="543" font-family="'Helvetica Neue',Arial,sans-serif" font-size="14" fill="#fff" text-anchor="middle" font-weight="bold">Go Back To Bed</text>
</svg>